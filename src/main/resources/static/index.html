<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Todo Manager</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            min-height: 100vh;
            font-family: "Segoe UI", sans-serif;
        }

        .app-title {
            font-weight: 700;
            color: #ffffff;
        }

        .subtitle {
            color: rgba(255,255,255,0.8);
        }

        .card {
            border-radius: 16px;
            border: none;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .todo-item {
            border-radius: 12px;
            transition: all 0.2s ease;
        }

        .todo-item:hover {
            background-color: #eef3ff;
            transform: translateY(-2px);
        }

        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid #d0d7e2;
        }

        .form-control:focus, .form-select:focus {
            border-color: #2a5298;
            box-shadow: 0 0 0 0.2rem rgba(42, 82, 152, 0.25);
        }

        .btn {
            border-radius: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            border: none;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .badge-priority-high {
            background-color: #dc3545;
        }

        .badge-priority-medium {
            background-color: #ffc107;
            color: black;
        }

        .badge-priority-low {
            background-color: #6c757d;
        }
    </style>
</head>

<body>

<div class="container py-5">

    <!-- HEADER -->
    <div class="text-center mb-4">
        <h2 class="app-title">📝 Todo Manager</h2>
        <p class="subtitle">Organize your tasks efficiently</p>
    </div>

    <!-- FORM -->
    <div class="card mb-4">
        <div class="card-body">

            <h5 class="mb-3">Add Task</h5>

            <div class="row g-3">

                <!-- Title -->
                <div class="col-md-6">
                    <label class="form-label">Title</label>
                    <input type="text" id="title" class="form-control" placeholder="Task title">
                </div>

                <!-- Priority -->
                <div class="col-md-3">
                    <label class="form-label">Priority</label>
                    <select id="priority" class="form-select">
                        <option value="LOW">Low</option>
                        <option value="MEDIUM">Medium</option>
                        <option value="HIGH">High</option>
                    </select>
                </div>

                <!-- Completed -->
                <div class="col-md-3 d-flex align-items-end">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="completed">
                        <label class="form-check-label">Completed</label>
                    </div>
                </div>

                <!-- Description -->
                <div class="col-12">
                    <label class="form-label">Description</label>
                    <textarea id="desc" class="form-control" rows="3" placeholder="Task description"></textarea>
                </div>

                <!-- Button -->
                <div class="col-12 d-grid">
                    <button class="btn btn-primary" onclick="addTodo()">Add Task</button>
                </div>

            </div>

        </div>
    </div>

    <!-- LIST -->
    <div class="card">
        <div class="card-body">

            <h5 class="mb-3">Your Tasks</h5>

            <ul id="todoList" class="list-group list-group-flush"></ul>

        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
